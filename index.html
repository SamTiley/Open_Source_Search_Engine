<script src="Open_Source_Search_Engine.js">
function search()
{
let input = document.getElementById('Open_Source_Search_Engine_List').value
input = input.toLowerCase();
let x = document.getElementsByClassName('Open_Source_Search_Engine_List');
for (i = 0; i < x.length; i++) {
if (!x[i].innerHTML.toLowerCase().includes(input)) {
x[i].style.display = "none";
}
else
{
x[i].style.display = "list-item";
}
}
}
</script>
</head>
<body>
<div class="Open_Source_Search_Engine">
<h1 class="title">Open Source Search Engine</h1>
<video poster="Open_Source_Search_Engine.bmp" src="Open_Source_Search_Engine.mp4" controls="autoplay"></video>
</div>
<div class="Open_Source_Search_Engine">
<div id="Open_Source_Search_Engine_List">
<div class="Open_Source_Search_Engine">
<input type="search" onkeyup="search()" name="search" id="search"  placeholder="Search">
<ul id="Open_Source_Search_Engine_List">
<li class="Open_Source_Search_Engine_List">
<a href=""></a>
</li>
</ul>
</div>
</div>
</div>

</div>
</a>

</div>
