<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Source Search Engine</title>
<link rel="stylesheet" href="Open_Source_Search_Engine.bmp">
<style>
html{background-color: black; color: white; text-align: center;}
a:link{color: black;}
a:visited{color: gray;}
video{background-color: white; border-radius: 9px; border-width: 9px; border-style: solid; border-color: gray; width: 699px; height: 699px;}
input{background-color: black; color: white; border-radius: 9px; border-width: 9px; border-style: solid; border-color: gray; width: 999px; font-size: xx-large; text-align: center;}
li{display: block;}
div{background-color: white; border-radius: 9px; border-width: 9px; border-style: solid; border-color: gray;}
.Open_Source_Search_Engine_Source_Code_On_GitHub:link{color: white; border-radius: 9px; border-width: 9px; border-style: solid; border-color: gray;}
.Open_Source_Search_Engine_Source_Code_On_GitHub:visited{color: gray; border-radius: 9px; border-width: 9px; border-style: solid; border-color: gray;}
</style>
<script>
function search()
{
let input = document.getElementById('search_1').value
input = input.toLowerCase();
let x = document.getElementById('search_2');
for (i = 0; i < x.length; i++) {
if (!x[i].innerHTML.toLowerCase().includes(input)) {
x[i].style.display = "none";
}
else
{
x[i].style.display = "list-item";
}
}
}
</script>
</head>
<body>
<h1>Open Source Search Engine<br><video poster="Open_Source_Search_Engine.bmp" src="Open_Source_Search_Engine.mp4" controls="autoplay"></video></h1>
<div>
<br>
<input type="search" onkeyup="search()" name="search" id="search_1"  placeholder="Search">
<ul>
<li id="search_2">
<a href="https://samtiley.github.io/Open_Source_Social_Media" title="Open Source Social Media">Open Source Social Media</a>
</li>
</ul>
</div>
<a class="Open_Source_Search_Engine_Source_Code_On_GitHub" href="https://github.com/SamTiley/Open_Source_Search_Engine" title="Open Source Search Engine Source Code On GitHub">Open Source Search Engine Source Code On GitHub</a>
</body>
</html>
